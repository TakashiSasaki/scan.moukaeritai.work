name: Deploy Firebase Functions

on:
  workflow_dispatch:
  push:
    branches:
      - scan.moukaeritai.work
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: "--no-deprecation"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install --loglevel=error --no-fund --no-audit
        working-directory: ./functions

      - name: Build Functions
        run: npm run build
        working-directory: ./functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'

      - name: Verify Deploy Targets
        id: verify-targets
        run: |
          DEPLOY_TARGETS="$(node scripts/verify-functions-deploy-targets.mjs)"
          echo "Generated deploy targets: $DEPLOY_TARGETS"
          echo "DEPLOY_TARGETS=$DEPLOY_TARGETS" >> $GITHUB_ENV

      - name: Deploy to Firebase
        run: npx --yes firebase-tools deploy --only "$DEPLOY_TARGETS" --project moukaeritaid --non-interactive
