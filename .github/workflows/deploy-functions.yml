name: Deploy Firebase Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: "--no-deprecation"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm ci

      - name: Validate contracts
        run: npm run contracts:validate

      - name: Verify versions and profiles
        run: npm run version:verify

      - name: Prepare Functions artifact
        run: npm run prepare:functions-artifact

      - name: Install Functions dependencies
        run: npm ci
        working-directory: ./functions

      - name: Validate Functions artifact
        run: npm run test:functions-artifact

      - name: Validate Functions runtime gate
        run: npm run test:functions-runtime-gate
      - name: Validate Functions import boundary
        run: npm run test:functions-boundary

      - name: Run Functions tests
        run: npm run test
        working-directory: ./functions

      - name: Build Functions
        run: npm run build
        working-directory: ./functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'

      - name: Verify Deploy Targets
        id: verify-targets
        run: |
          DEPLOY_TARGETS="$(node scripts/verify-functions-deploy-targets.mjs)"
          echo "Generated deploy targets: $DEPLOY_TARGETS"
          echo "DEPLOY_TARGETS=$DEPLOY_TARGETS" >> $GITHUB_ENV

      - name: Deploy to Firebase
        run: npx --yes firebase-tools deploy --only "$DEPLOY_TARGETS" --project moukaeritaid --non-interactive
