name: Finalize agent-policy adoption

on:
  pull_request:
    types:
      - synchronize
    branches:
      - scan.moukaeritai.work

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'chatgpt-agent-policy-adoption'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout authorized head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Revalidate revision and prepared state
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          state = json.loads(Path('.agent-policy/adoption.json').read_text(encoding='utf-8'))
          assert state['status'] == 'prepared', state['status']
          assert state['primary_instructions'] == 'AGENTS.md'
          assert state['preview_output'] == '.agent-policy/preview/AGENTS.md'
          assert state['verification_command'] == 'npm run verify:pr'
          assert state['backup_path'] is None
          assert state['final_output'] is None
          assert not Path('.agent-policy/adoption/original/AGENTS.md').exists()

          expected = next(
              item['sha256'] for item in state['sources'] if item['path'] == 'AGENTS.md'
          )
          actual = hashlib.sha256(Path('AGENTS.md').read_bytes()).hexdigest()
          assert actual == expected, (actual, expected)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned agent-policy toolchain
        run: >-
          python -m pip install --disable-pip-version-check
          "git+https://github.com/TakashiSasaki/agent-policy.git@848923054e168eb2f8c696e73e2273ba8bf09501"

      - name: Revalidate preview before finalization
        run: agent-policy --repository "$GITHUB_WORKSPACE" adopt preview

      - name: Apply finalization transaction
        shell: bash
        run: |
          set -euo pipefail
          agent-policy --repository "$GITHUB_WORKSPACE" adopt finalize \
            --backup-path .agent-policy/adoption/original/AGENTS.md \
            --apply \
            | tee agent-policy-finalize-apply.txt

      - name: Verify finalized state and backup integrity
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          state = json.loads(Path('.agent-policy/adoption.json').read_text(encoding='utf-8'))
          assert state['status'] == 'finalized', state['status']
          assert state['backup_path'] == '.agent-policy/adoption/original/AGENTS.md'
          assert state['final_output'] == 'AGENTS.md'
          assert not Path('.agent-policy/preview/AGENTS.md').exists()

          backup = Path(state['backup_path'])
          expected = next(
              item['sha256'] for item in state['sources'] if item['path'] == 'AGENTS.md'
          )
          actual = hashlib.sha256(backup.read_bytes()).hexdigest()
          assert actual == expected, (actual, expected)

          generated = Path('AGENTS.md').read_text(encoding='utf-8')
          assert 'agent-policy-generated: true' in generated
          assert 'DO NOT EDIT DIRECTLY' in generated
          PY
          agent-policy --repository "$GITHUB_WORKSPACE" validate
          agent-policy --repository "$GITHUB_WORKSPACE" check

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Test version-governance classification
        run: node scripts/verify-version.mjs --self-test

      - name: Prepare Functions artifact prerequisites
        run: npm run prepare:functions-artifact

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Run product PR verification
        shell: bash
        run: |
          set -o pipefail
          npm run verify:pr 2>&1 | tee product-verify-pr.txt

      - name: Record finalization evidence
        if: always()
        shell: bash
        run: git status --short | tee agent-policy-finalize-status.txt

      - name: Upload finalization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-policy-adoption-finalized
          path: |
            AGENTS.md
            .agent-policy.yml
            .agent-policy.lock
            .agent-policy/adoption.json
            .agent-policy/adoption/original/AGENTS.md
            .agents/skills/validate-agent-policy/SKILL.md
            agent-policy-finalize-apply.txt
            agent-policy-finalize-status.txt
            product-verify-pr.txt
          include-hidden-files: true
          if-no-files-found: warn

      - name: Remove one-shot workflow and commit finalized state
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/dogfood-agent-policy-adoption.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Finalize agent-policy adoption"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
