name: Dogfood agent-policy adoption

on:
  pull_request:
    branches:
      - scan.moukaeritai.work
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout bootstrap skill
        uses: actions/checkout@v4
        with:
          repository: TakashiSasaki/agent-policy
          ref: bootstrap-agent-policy
          path: .agent-policy-bootstrap

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inspect and dry-run recommended route
        shell: bash
        run: |
          set -o pipefail
          python .agent-policy-bootstrap/scripts/bootstrap.py \
            --repository "$GITHUB_WORKSPACE" \
            | tee agent-policy-dry-run.txt

      - name: Upload dry-run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-policy-dry-run
          path: agent-policy-dry-run.txt
          if-no-files-found: error
