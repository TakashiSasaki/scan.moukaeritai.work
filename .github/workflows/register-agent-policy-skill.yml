name: Register agent-policy skill

on:
  pull_request:
    branches:
      - scan.moukaeritai.work
    types:
      - reopened

permissions:
  contents: write

concurrency:
  group: register-agent-policy-skill-chatgpt-agent-policy-adoption
  cancel-in-progress: true

jobs:
  register:
    if: github.event.pull_request.head.ref == 'chatgpt-agent-policy-adoption'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: chatgpt-agent-policy-adoption
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Register generated skill and adapt integrity gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path('.agents/skills/manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          skills = manifest['skills']
          if any(skill.get('id') == 'validate-agent-policy' for skill in skills):
              raise SystemExit('validate-agent-policy is already registered')
          preflight_index = next(
              index for index, skill in enumerate(skills)
              if skill.get('id') == 'repository-preflight'
          )
          skills.insert(preflight_index + 1, {
              'id': 'validate-agent-policy',
              'path': '.agents/skills/validate-agent-policy/SKILL.md',
              'status': 'active',
              'description': 'Validates managed agent-policy configuration, lock state, and generated outputs with the pinned toolchain.',
              'requiredFor': [
                  'Changes to agent-policy configuration, repository policy inputs, generated instructions, generated skills, the lock file, or policy CI'
              ],
              'executionClass': 'fast/PR',
              'mutationPolicy': 'read-only unless synchronization is explicitly requested',
              'managedBy': '.agent-policy.yml',
              'nonGoals': [
                  'Do not edit generated AGENTS.md or generated skill files directly.',
                  'Do not substitute a mutable branch or unpinned package release for the configured toolchain revision.'
              ]
          })
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')

          skill_test_path = Path('scripts/test-agent-skills.mjs')
          skill_test = skill_test_path.read_text(encoding='utf-8')

          status_marker = '  // Validate status\n'
          if skill_test.count(status_marker) != 1:
              raise SystemExit('status validation marker did not match exactly once')
          managed_validation = """  if (entry.managedBy !== undefined) {
            if (typeof entry.managedBy !== 'string' || entry.managedBy.length === 0) {
              fail(`Manifest entry has invalid field \"managedBy\" for skill \"${entry.id}\"`);
            }
            const managerPath = path.join(rootDir, entry.managedBy);
            if (!fs.existsSync(managerPath)) {
              fail(`Skill \"${entry.id}\" references missing manager \"${entry.managedBy}\"`);
            }
          }

          """
          skill_test = skill_test.replace(status_marker, managed_validation + status_marker)

          core_marker = "  'repository-preflight',\n  'version-governance',"
          core_replacement = "  'repository-preflight',\n  'validate-agent-policy',\n  'version-governance',"
          if skill_test.count(core_marker) != 1:
              raise SystemExit('required core skill marker did not match exactly once')
          skill_test = skill_test.replace(core_marker, core_replacement)

          section_marker = '  // Verify sections\n'
          if skill_test.count(section_marker) != 1:
              raise SystemExit('section validation marker did not match exactly once')
          generated_guard = """  if (skill.managedBy === '.agent-policy.yml') {
            const requiredMarkers = [
              'agent-policy-generated: true',
              `source-skill: ${skillId}`,
              'DO NOT EDIT DIRECTLY',
              `name: ${skillId}`
            ];
            for (const marker of requiredMarkers) {
              if (!content.includes(marker)) {
                fail(`Managed skill \"${skillId}\" is missing generated marker: \"${marker}\"`);
              }
            }
            continue;
          }

          """
          skill_test = skill_test.replace(section_marker, generated_guard + section_marker)
          skill_test_path.write_text(skill_test, encoding='utf-8')

          version_path = Path('scripts/verify-version.mjs')
          version_test = version_path.read_text(encoding='utf-8')
          old_tooling = "const isVersionGovernanceTooling = normalized === 'scripts/verify-version.mjs';"
          new_tooling = """const isVersionGovernanceTooling = normalized === 'scripts/verify-version.mjs'
            || normalized === 'scripts/test-agent-skills.mjs';"""
          if version_test.count(old_tooling) != 1:
              raise SystemExit('version tooling classification did not match exactly once')
          version_test = version_test.replace(old_tooling, new_tooling)
          old_case = "    ['version governance tooling', 'scripts/verify-version.mjs', false]"
          new_case = """    ['version governance tooling', 'scripts/verify-version.mjs', false],
            ['agent skill integrity tooling', 'scripts/test-agent-skills.mjs', false]"""
          if version_test.count(old_case) != 1:
              raise SystemExit('version tooling self-test case did not match exactly once')
          version_test = version_test.replace(old_case, new_case)
          version_path.write_text(version_test, encoding='utf-8')
          PY

      - name: Install pinned agent-policy toolchain
        run: python -m pip install "git+https://github.com/TakashiSasaki/agent-policy.git@a951b3ba55083152f3fe0040fd3f307a33d66410"

      - name: Validate managed policy state
        run: |
          agent-policy --repository . validate --config .agent-policy.yml
          agent-policy --repository . check --config .agent-policy.yml

      - name: Verify skill registry integrity
        run: node scripts/test-agent-skills.mjs

      - name: Verify version classification
        run: node scripts/verify-version.mjs --self-test

      - name: Install repository dependencies
        run: npm ci

      - name: Prepare EFP model artifact
        run: npm --prefix packages/efp-model run build

      - name: Prepare Functions prerequisite artifact
        run: npm run prepare:functions-artifact

      - name: Install Functions prerequisite dependencies
        run: npm ci --prefix functions

      - name: Run complete repository verification
        run: npm run verify:pr

      - name: Commit verified registration
        env:
          BRANCH: chatgpt-agent-policy-adoption
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          remote_head="$(git ls-remote origin "refs/heads/${BRANCH}" | cut -f1)"
          if [ "$remote_head" != "$EXPECTED_HEAD" ]; then
            echo "Branch moved during verification: expected $EXPECTED_HEAD, found $remote_head" >&2
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .agents/skills/manifest.json \
            scripts/test-agent-skills.mjs \
            scripts/verify-version.mjs
          git rm .github/workflows/register-agent-policy-skill.yml
          git diff --cached --check
          git commit -m 'Register generated agent-policy skill'
          git push origin "HEAD:${BRANCH}"
