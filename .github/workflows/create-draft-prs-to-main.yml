name: Create Draft PRs to Main

on:
  push:
    branches:
      - jules
      - codex
      - hermes
  workflow_dispatch:

jobs:
  create-draft-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Draft PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine target branches to check
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TARGET_BRANCHES=("${{ github.ref_name }}")
          else
            TARGET_BRANCHES=("jules" "codex" "hermes")
          fi

          for BRANCH in "${TARGET_BRANCHES[@]}"; do
            echo "Checking branch: $BRANCH"
            
            # Ensure we have the latest from origin
            git fetch origin $BRANCH || echo "Could not fetch $BRANCH"
            
            # Skip if branch doesn't exist on remote
            if ! git show-ref --verify --quiet refs/remotes/origin/$BRANCH; then
              echo "Branch origin/$BRANCH does not exist. Skipping."
              continue
            fi

            # Fetch main to compare
            git fetch origin main
            
            # Check for differences: origin/main..origin/$BRANCH
            DIFF_COUNT=$(git rev-list --count origin/main..origin/$BRANCH)
            
            if [ "$DIFF_COUNT" -eq "0" ]; then
              echo "No changes in $BRANCH relative to main. Skipping PR creation."
              continue
            fi

            echo "Branch $BRANCH has $DIFF_COUNT new commits. Checking for existing PR..."
            
            # Check if an open PR already exists for this head/base pair
            EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
            
            if [ -n "$EXISTING_PR" ]; then
              echo "PR #$EXISTING_PR already exists for $BRANCH -> main. Skipping."
              continue
            fi

            echo "Creating draft PR for $BRANCH -> main..."
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Draft: Merge $BRANCH into main" \
              --body "Automated draft PR to merge changes from $BRANCH into main." \
              --draft || echo "Failed to create draft PR for $BRANCH."
          done
