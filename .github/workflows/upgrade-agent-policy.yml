name: Upgrade agent-policy toolchain

on:
  push:
    branches:
      - chatgpt-agent-policy-adoption
  pull_request:
    branches:
      - scan.moukaeritai.work
    types:
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: upgrade-agent-policy-chatgpt-agent-policy-adoption
  cancel-in-progress: true

jobs:
  upgrade:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: chatgpt-agent-policy-adoption
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Update pinned toolchain revision
        env:
          OLD_REVISION: 848923054e168eb2f8c696e73e2273ba8bf09501
          NEW_REVISION: a951b3ba55083152f3fe0040fd3f307a33d66410
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path('.agent-policy.yml')
          content = path.read_text(encoding='utf-8')
          old = os.environ['OLD_REVISION']
          new = os.environ['NEW_REVISION']
          if content.count(old) != 1:
              raise SystemExit(f'Expected exactly one old revision, found {content.count(old)}')
          path.write_text(content.replace(old, new), encoding='utf-8')
          PY

      - name: Install pinned agent-policy toolchain
        run: python -m pip install "git+https://github.com/TakashiSasaki/agent-policy.git@a951b3ba55083152f3fe0040fd3f307a33d66410"

      - name: Regenerate and validate policy outputs
        run: |
          agent-policy --repository . render --config .agent-policy.yml
          agent-policy --repository . validate --config .agent-policy.yml
          agent-policy --repository . check --config .agent-policy.yml

      - name: Verify discovery improvements
        run: |
          grep -F 'configuration: .agent-policy.yml' AGENTS.md
          grep -F '## Policy system' AGENTS.md
          grep -F 'Pinned shared toolchain: `TakashiSasaki/agent-policy@a951b3ba55083152f3fe0040fd3f307a33d66410`' AGENTS.md
          grep -F '`.agents/skills/validate-agent-policy/SKILL.md`' AGENTS.md
          grep -F 'TakashiSasaki/agent-policy@a951b3ba55083152f3fe0040fd3f307a33d66410:policy/core/change-contract.md' AGENTS.md
          grep -F 'agent-policy --repository . validate --config .agent-policy.yml' .agents/skills/validate-agent-policy/SKILL.md
          grep -F 'revision: a951b3ba55083152f3fe0040fd3f307a33d66410' .agent-policy.lock

      - name: Remove transient adoption logs
        run: |
          git rm -- \
            agent-policy-finalize-apply.txt \
            agent-policy-finalize-status.txt \
            product-verify-pr.txt

      - name: Install repository dependencies
        run: npm ci

      - name: Prepare EFP model artifact
        run: npm --prefix packages/efp-model run build

      - name: Prepare Functions prerequisite artifact
        run: npm run prepare:functions-artifact

      - name: Install Functions prerequisite dependencies
        run: npm ci --prefix functions

      - name: Validate repository bootstrap
        run: node scripts/validate-repository-bootstrap.mjs

      - name: Validate documentation state
        run: node scripts/validate-documentation-state.mjs

      - name: Verify version governance
        run: node scripts/verify-version.mjs

      - name: Validate contracts
        run: npm run contracts:validate

      - name: Check generated contract types
        run: npm run contracts:check-generated

      - name: Test Firestore policy
        run: npm run test:firestore-policy

      - name: Test routing
        run: npm run test:routing

      - name: Run root tests
        run: npm run test

      - name: Typecheck root application
        run: npm run lint

      - name: Build root application
        run: npm run build

      - name: Build EFP model package
        run: npm --prefix packages/efp-model run build

      - name: Typecheck EFP model package
        run: npm --prefix packages/efp-model run typecheck

      - name: Test EFP model package
        run: npm --prefix packages/efp-model run test

      - name: Prepare Functions artifact
        run: npm run prepare:functions-artifact

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Build Functions
        run: npm --prefix functions run build

      - name: Test Functions
        run: npm --prefix functions run test

      - name: Test Functions artifact
        run: npm run test:functions-artifact

      - name: Test Functions boundary
        run: npm run test:functions-boundary

      - name: Commit verified generated state
        env:
          BRANCH: chatgpt-agent-policy-adoption
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          remote_head="$(git ls-remote origin "refs/heads/${BRANCH}" | cut -f1)"
          if [ "$remote_head" != "$EXPECTED_HEAD" ]; then
            echo "Branch moved during verification: expected $EXPECTED_HEAD, found $remote_head" >&2
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .agent-policy.yml .agent-policy.lock AGENTS.md .agents/skills/validate-agent-policy/SKILL.md
          git rm .github/workflows/upgrade-agent-policy.yml
          git diff --cached --check
          git commit -m 'Upgrade agent-policy toolchain revision'
          git push origin "HEAD:${BRANCH}"
