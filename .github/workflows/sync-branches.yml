name: Sync Source Branches to Hub

on:
  push:
    branches:
      - main
      - jules
      - codex
      - hermes
      - chatgpt
  workflow_dispatch:
    inputs:
      source_branch:
        description: Source branch to merge into scan.moukaeritai.work
        required: true
        type: choice
        options:
          - main
          - jules
          - codex
          - hermes
          - chatgpt

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-source-branches-to-scan-moukaeritai-work
  cancel-in-progress: false

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      HUB_BRANCH: scan.moukaeritai.work
      SOURCE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.source_branch || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out hub branch
        uses: actions/checkout@v4
        with:
          ref: scan.moukaeritai.work
          fetch-depth: 0

      - name: Merge source branch into hub
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          case "$SOURCE_BRANCH" in
            main|jules|codex|hermes|chatgpt) ;;
            *)
              echo "Unsupported source branch: $SOURCE_BRANCH" >&2
              exit 1
              ;;
          esac

          git fetch origin \
            "+refs/heads/$HUB_BRANCH:refs/remotes/origin/$HUB_BRANCH" \
            "+refs/heads/$SOURCE_BRANCH:refs/remotes/origin/$SOURCE_BRANCH"
          git checkout -B "$HUB_BRANCH" "origin/$HUB_BRANCH"

          if git merge-base --is-ancestor "origin/$SOURCE_BRANCH" HEAD; then
            echo "$SOURCE_BRANCH is already contained in $HUB_BRANCH. Nothing to do."
            exit 0
          fi

          if git merge --no-edit "origin/$SOURCE_BRANCH"; then
            echo "Merged $SOURCE_BRANCH into $HUB_BRANCH."
            git push origin "HEAD:$HUB_BRANCH"
            exit 0
          fi

          echo "Merge conflict detected between $SOURCE_BRANCH and $HUB_BRANCH."
          git merge --abort

          existing_pr=$(gh pr list \
            --head "$SOURCE_BRANCH" \
            --base "$HUB_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "$existing_pr" ]]; then
            echo "Open PR #$existing_pr already exists for $SOURCE_BRANCH -> $HUB_BRANCH."
            exit 0
          fi

          gh pr create \
            --base "$HUB_BRANCH" \
            --head "$SOURCE_BRANCH" \
            --title "Sync: Merge $SOURCE_BRANCH into $HUB_BRANCH" \
            --body "Automated draft PR created because merging \`$SOURCE_BRANCH\` into \`$HUB_BRANCH\` produced conflicts." \
            --draft
