name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java (for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install root dependencies
        run: npm ci

      - name: Build efp-model package
        run: npm --prefix packages/efp-model run build

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Prepare functions artifact
        run: npm run prepare:functions-artifact

      - name: Run verification baseline
        run: npm run verify:baseline
