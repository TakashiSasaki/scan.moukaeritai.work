name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - codex
      - jules
      - hermes
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Run bootstrap validation
        run: node scripts/validate-repository-bootstrap.mjs

      - name: Install root dependencies
        run: npm ci

      - name: Run PR verification
        run: npm run verify:pr
