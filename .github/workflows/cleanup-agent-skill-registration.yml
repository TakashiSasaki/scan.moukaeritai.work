name: Clean up agent-policy skill registration

on:
  pull_request:
    branches:
      - scan.moukaeritai.work
    types:
      - reopened

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.ref == 'chatgpt-agent-policy-adoption'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: chatgpt-agent-policy-adoption
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Normalize registration implementation
        run: |
          python - <<'PY'
          from pathlib import Path

          skill_test_path = Path('scripts/test-agent-skills.mjs')
          skill_test = skill_test_path.read_text(encoding='utf-8')

          managed_start = skill_test.index('  if (entry.managedBy !== undefined) {\n')
          managed_end = skill_test.index('\n\n  // Validate status', managed_start)
          managed_block = """  if (entry.managedBy !== undefined) {
            if (typeof entry.managedBy !== 'string' || entry.managedBy.length === 0) {
              fail(`Manifest entry has invalid field \"managedBy\" for skill \"${entry.id}\"`);
            }
            const managerPath = path.join(rootDir, entry.managedBy);
            if (!fs.existsSync(managerPath)) {
              fail(`Skill \"${entry.id}\" references missing manager \"${entry.managedBy}\"`);
            }
          }"""
          skill_test = skill_test[:managed_start] + managed_block + skill_test[managed_end:]

          guard_start = skill_test.index("  if (skill.managedBy === '.agent-policy.yml') {\n")
          guard_end = skill_test.index('\n\n  // Verify sections', guard_start)
          guard_block = """  if (skill.managedBy === '.agent-policy.yml') {
            const requiredMarkers = [
              'agent-policy-generated: true',
              `source-skill: ${skillId}`,
              'DO NOT EDIT DIRECTLY',
              `name: ${skillId}`
            ];
            for (const marker of requiredMarkers) {
              if (!content.includes(marker)) {
                fail(`Managed skill \"${skillId}\" is missing generated marker: \"${marker}\"`);
              }
            }
            continue;
          }"""
          skill_test = skill_test[:guard_start] + guard_block + skill_test[guard_end:]
          skill_test_path.write_text(skill_test, encoding='utf-8')

          version_path = Path('scripts/verify-version.mjs')
          version = version_path.read_text(encoding='utf-8')
          version = version.replace(
              "  const isVersionGovernanceTooling = normalized === 'scripts/verify-version.mjs'\n  || normalized === 'scripts/test-agent-skills.mjs';",
              "  const isVersionGovernanceTooling = normalized === 'scripts/verify-version.mjs'\n    || normalized === 'scripts/test-agent-skills.mjs';"
          )
          version = version.replace(
              "    ['version governance tooling', 'scripts/verify-version.mjs', false],\n  ['agent skill integrity tooling', 'scripts/test-agent-skills.mjs', false]",
              "    ['version governance tooling', 'scripts/verify-version.mjs', false],\n    ['agent skill integrity tooling', 'scripts/test-agent-skills.mjs', false]"
          )
          version_path.write_text(version, encoding='utf-8')

          hygiene_path = Path('.agents/skills/repository-hygiene/SKILL.md')
          hygiene = hygiene_path.read_text(encoding='utf-8')
          old = 'fast for status/diff; PR or release for the full hygiene script.'
          new = 'fast for status/diff; use the corresponding PR or release verification tier when required.'
          if hygiene.count(old) != 1:
              raise SystemExit('repository hygiene execution-class wording did not match exactly once')
          hygiene_path.write_text(hygiene.replace(old, new), encoding='utf-8')
          PY

      - name: Install pinned agent-policy toolchain
        run: python -m pip install "git+https://github.com/TakashiSasaki/agent-policy.git@a951b3ba55083152f3fe0040fd3f307a33d66410"

      - name: Validate managed policy state
        run: |
          agent-policy --repository . validate --config .agent-policy.yml
          agent-policy --repository . check --config .agent-policy.yml

      - name: Verify focused skill integrity
        run: |
          node scripts/test-agent-skills.mjs
          node scripts/verify-version.mjs --self-test

      - name: Install repository dependencies
        run: npm ci

      - name: Prepare clean verification prerequisites
        run: |
          npm --prefix packages/efp-model run build
          npm run prepare:functions-artifact
          npm ci --prefix functions

      - name: Run complete repository verification
        run: npm run verify:pr

      - name: Commit verified cleanup
        env:
          BRANCH: chatgpt-agent-policy-adoption
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          remote_head="$(git ls-remote origin "refs/heads/${BRANCH}" | cut -f1)"
          if [ "$remote_head" != "$EXPECTED_HEAD" ]; then
            echo "Branch moved during verification: expected $EXPECTED_HEAD, found $remote_head" >&2
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .agents/skills/repository-hygiene/SKILL.md \
            scripts/test-agent-skills.mjs \
            scripts/verify-version.mjs
          git rm .github/workflows/cleanup-agent-skill-registration.yml
          git diff --cached --check
          git commit -m 'Clean up generated skill registration'
          git push origin "HEAD:${BRANCH}"
